<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for the f's -->
    <linearGradient id="fGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#3B8BEB"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>

    <!-- Individual color stops -->
    <linearGradient id="fLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </linearGradient>

    <linearGradient id="fMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#448AFF"/>
      <stop offset="100%" stop-color="#2979FF"/>
    </linearGradient>

    <linearGradient id="fRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#651FFF"/>
    </linearGradient>

    <!-- Fuzzy blur filter for the middle f -->
    <filter id="fuzzyMiddle" x="-30%" y="-10%" width="160%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Glow for overlapping areas -->
    <filter id="overlapGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background matching VS Code sidebar -->
  <rect width="512" height="512" rx="64" fill="#252526"/>

  <!-- Subtle radial background glow -->
  <circle cx="256" cy="240" r="180" fill="url(#fGradient)" opacity="0.08"/>

  <g filter="url(#shadow)">
    <!-- Left f -->
    <g transform="translate(130, 110)">
      <!-- Vertical stem -->
      <rect x="30" y="0" width="22" height="260" rx="11" fill="url(#fLeft)"/>
      <!-- Top hook -->
      <path d="M30 0 Q52 -10 52 30 L52 50 L30 50 Z" fill="url(#fLeft)"/>
      <!-- Crossbar -->
      <rect x="30" y="60" width="90" height="18" rx="9" fill="url(#fLeft)"/>
    </g>

    <!-- Middle f (blurred/fuzzy) -->
    <g transform="translate(228, 90)" filter="url(#fuzzyMiddle)">
      <!-- Vertical stem -->
      <rect x="30" y="0" width="22" height="280" rx="11" fill="url(#fMid)"/>
      <!-- Top hook -->
      <path d="M30 0 Q52 -10 52 30 L52 50 L30 50 Z" fill="url(#fMid)"/>
      <!-- Crossbar -->
      <rect x="30" y="65" width="95" height="18" rx="9" fill="url(#fMid)"/>
    </g>

    <!-- Right f -->
    <g transform="translate(326, 110)">
      <!-- Vertical stem -->
      <rect x="30" y="0" width="22" height="260" rx="11" fill="url(#fRight)"/>
      <!-- Top hook -->
      <path d="M30 0 Q52 -10 52 30 L52 50 L30 50 Z" fill="url(#fRight)"/>
      <!-- Crossbar -->
      <rect x="30" y="60" width="90" height="18" rx="9" fill="url(#fRight)"/>
    </g>
  </g>

  <!-- Overlap glow between letters -->
  <g filter="url(#overlapGlow)" opacity="0.4">
    <ellipse cx="215" cy="220" rx="30" ry="100" fill="#448AFF"/>
    <ellipse cx="315" cy="220" rx="30" ry="100" fill="#7C4DFF"/>
  </g>
</svg>
