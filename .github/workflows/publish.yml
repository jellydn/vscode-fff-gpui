name: Publish

on:
  push:
    branches:
      - main

# 🔑 One-time token setup:
#
#   Open VSX Registry:
#     Get your token at https://open-vsx.org/user-settings/tokens
#     Store as GitHub secret: OPEN_VSX_TOKEN
#
#   VS Code Marketplace:
#     1. Sign into https://dev.azure.com/ with your publisher account
#     2. Create a PAT at User Settings → Personal Access Tokens:
#        - Organization: "All accessible organizations"
#        - Scope: Marketplace → Manage (not just Publish)
#     3. Store as GitHub secret: VS_MARKETPLACE_TOKEN

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - run: pnpm package

      - name: Check if version changed
        id: version-check
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          OLD_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" || echo "")
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version bumped: $OLD_VERSION → $NEW_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged ($NEW_VERSION) — skipping publish"
          fi

      - name: Set VSIX filename
        if: steps.version-check.outputs.changed == 'true'
        run: echo "VSIX=vscode-fff-gpui-${{ steps.version-check.outputs.new }}.vsix" >> $GITHUB_ENV

      - name: Publish to Open VSX Registry
        if: steps.version-check.outputs.changed == 'true'
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ env.VSIX }}

      - name: Publish to VS Code Marketplace
        if: steps.version-check.outputs.changed == 'true'
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          extensionFile: ${{ env.VSIX }}
          registryUrl: https://marketplace.visualstudio.com