name: Publish

on:
  push:
    tags:
      - 'v*'

# Azure OIDC setup (one-time per repo):
#   1. Create an App Registration in Azure Portal (portal.azure.com)
#   2. Add federated credential for GitHub Actions (repo: jellydn/vscode-fff-gpui)
#   3. Add the managed identity to your VS Code Marketplace publisher
#   4. Set GitHub variables: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   Docs: https://code.visualstudio.com/api/working-with-extensions/publishing-extension

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - run: pnpm package

      - name: Set VSIX filename
        run: echo "VSIX=vscode-fff-gpui-$(node -p "require('./package.json').version").vsix" >> $GITHUB_ENV

      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ env.VSIX }}

      - name: Azure login (Entra ID OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath ${{ env.VSIX }} --azure-credential
