name: Publish

on:
  push:
    branches:
      - main

# 🪪 One-time Azure OIDC setup (run these commands once):
#
#   # 1. Create App Registration + Service Principal
#   APP_ID=$(az ad app create --display-name "vscode-fff-gpui-publisher" --query appId -o tsv)
#   az ad sp create --id "$APP_ID" --query id -o tsv
#
#   # 2. Add federated credential (trust GitHub Actions via OIDC)
#   az ad app federated-credential create --id "$APP_ID" \
#     --parameters '{
#       "name": "github-actions-publish",
#       "issuer": "https://token.actions.githubusercontent.com",
#       "subject": "repo:jellydn/vscode-fff-gpui:ref:refs/heads/main",
#       "description": "OIDC trust for main-branch publish workflow",
#       "audiences": ["api://AzureADTokenExchange"]
#     }'
#
#   # 3. Get your tenant ID
#   TENANT_ID=$(az account show --query tenantId -o tsv)
#
#   # 4. Add service principal to VS Code Marketplace publisher:
#   #    Get the SP Object ID with: az ad sp show --id "$APP_ID" --query id -o tsv
#   #    Then go to https://marketplace.visualstudio.com/manage/publishers/jellydn → Members
#   #    → Add Member → paste the SP Object ID → Contributor → Save
#
#   # 5. Set GitHub Actions variables (repo Settings → Secrets and variables → Actions → Variables):
#   #    - AZURE_CLIENT_ID = $APP_ID
#   #    - AZURE_TENANT_ID = $TENANT_ID
#
# No Azure subscription needed — this uses Entra ID identity only.

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - run: pnpm package

      - name: Check if version changed
        id: version-check
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          OLD_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" || echo "")
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version bumped: $OLD_VERSION → $NEW_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged ($NEW_VERSION) — skipping publish"
          fi

      - name: Set VSIX filename
        if: steps.version-check.outputs.changed == 'true'
        run: echo "VSIX=vscode-fff-gpui-${{ steps.version-check.outputs.new }}.vsix" >> $GITHUB_ENV

      - name: Publish to Open VSX Registry
        if: steps.version-check.outputs.changed == 'true'
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ env.VSIX }}

      - name: Azure login (Entra ID OIDC)
        if: steps.version-check.outputs.changed == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        if: steps.version-check.outputs.changed == 'true'
        run: npx vsce publish --packagePath ${{ env.VSIX }} --azure-credential
